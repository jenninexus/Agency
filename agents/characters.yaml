# JenniNexus AI Agent Characters
# ================================
# Single source of truth for AI image generation prompts.
# Used by: scripts/generate-agent-portrait.ps1
# Pattern: Adapted from neophi/src/assets/data/characters.yaml
#
# Each agent has two prompt variants:
#   landscape — 16:9 environment shot (team page, blog headers)
#   square    — 1:1 portrait (avatars, social cards, agents.php)
#
# Environment: All agents share the same cyberpunk penthouse studio
# in futuristic Seattle — floor-to-ceiling windows, neon cityscape,
# holographic screens, hot tub lounge, rain-streaked glass.
# Each agent has their own corner/workstation within the shared space.

# --- Shared Style ---
# Appended to every prompt automatically by the generator script.
# Edit here to change the global aesthetic for all agents.
shared_style: >-
  Cinematic digital illustration, semi-realistic with anime influence in eyes and proportions.
  Cyberpunk penthouse studio aesthetic: luxury high-rise interior with floor-to-ceiling rain-streaked windows
  overlooking a futuristic neon-lit Seattle skyline at night. Moody ambient lighting with colored neon accents.
  Interior details: polished concrete floors, exposed industrial beams, floating holographic display panels,
  a glass-walled hot tub with purple-cyan steam visible in the living area behind the character.
  Multiple transparent screens and holographic UI elements float in the air around the workspace.
  Rain streaks on window glass catch neon reflections from the city below.
  High detail, clean rendering, professional character art. No text or watermarks.

# --- Shared Face Style ---
# Appended to portrait_3x4 prompts for consistent face rendering across all agents.
# Based on the Vidette square and DivineDesign portrait reference art styles.
shared_face_style: >-
  Semi-realistic face with near-photorealistic skin rendering, natural skin texture and pores visible,
  defined bone structure and jawline, realistic detailed eyes with visible iris texture and catchlights,
  natural subtle makeup with soft contouring, real eyelashes, defined eyebrows with individual hairs,
  soft volumetric lighting on face, gentle subsurface scattering on skin, natural lip color and texture.
  Face should look like a high-end digital portrait — more photorealistic than anime, with warmth and personality.

# --- Agents ---
