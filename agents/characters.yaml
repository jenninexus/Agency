# AI Agent Agency — Character Image Prompts
# ==========================================
# Single source of truth for AI image generation prompts.
# Used by: scripts/generate-agent-portrait.ps1 (adapt path for your project)
#
# Each agent has three prompt variants:
#   landscape — 16:9 environment shot (team page, blog headers)
#   square    — 1:1 portrait (avatars, social cards, agents.php)
#   portrait_3x4 — 3:4 close-up (profile images, Instagram)
#
# Environment: All agents share one cyberpunk penthouse studio in futuristic
# Seattle — a single large loft space with separate "corners" per agent.
# Floor-to-ceiling rain-streaked windows, neon cityscape outside, polished
# concrete floors, exposed industrial beams, hot tub lounge in the far corner,
# holographic displays floating everywhere. Night. Neon palette: purple, cyan,
# hot pink, amber. Each agent owns their corner but the shared space is visible.

# --- Shared Style ---
# Appended to every prompt automatically by the generator script.
# Edit here to change the global aesthetic for all agents.
shared_style: >-
  Cinematic semi-realistic digital illustration with subtle anime influence in eyes and proportions.
  Art style: high-end concept art for a premium game studio — not cartoonish, not photorealistic, but vivid and polished.
  Setting: luxury cyberpunk penthouse loft in futuristic Seattle at night. Single open-plan space shared by all agents.
  Architecture: polished dark concrete floors, exposed industrial steel beams, 12-foot floor-to-ceiling rain-streaked glass walls
  on two sides, city lights and neon signs visible through rain. Far corner: glass-walled hot tub with glowing purple-cyan mist.
  Lighting: moody ambient from city glow through wet glass, plus colored neon strips — each character has their corner's accent color.
  Floating holographic UI panels, transparent screens, and data visualizations drift in the air at every workstation.
  Quality: ultra high detail, clean professional rendering, cinematic depth of field, no text overlays, no watermarks.
  All 6 agents must feel like they belong in the same illustrated world — consistent art style, shared environment language.

# --- Shared Face Style ---
# Appended to portrait_3x4 prompts for consistent face rendering across all agents.
shared_face_style: >-
  Semi-realistic face with near-photorealistic skin — natural pores, soft subsurface scattering, defined bone structure.
  Eyes: realistic iris texture, proper catchlights from neon environment, natural eyelashes and brow hairs.
  Makeup: subtle, character-appropriate — not overpainted. Skin should have warmth and personality.
  Lighting: volumetric from the character's dominant neon color hitting face softly from monitor/environment.
  Expression: confident but approachable — professional character art for a game studio team page.
  Face feel: high-end digital portrait, closer to photorealistic than anime, with just enough stylization to feel illustrated.

